{% extends 'base.html' %}
{% block title %}變更密碼{% endblock %}
{% block content %}
<section class="admin-header"><div class="container"><div><span class="eyebrow">ADMIN CONSOLE</span><h1>變更管理者密碼</h1><p>新密碼至少 12 個字元。</p></div>{% include 'admin/_nav.html' %}</div></section>
<section class="section container narrow"><form method="post" class="panel form-panel"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>目前密碼<input type="password" name="current_password" autocomplete="current-password" required></label><label>新密碼<input type="password" name="new_password" autocomplete="new-password" minlength="12" required></label><label>確認新密碼<input type="password" name="confirm_password" autocomplete="new-password" minlength="12" required></label><div class="form-actions"><a class="btn btn-ghost" href="{{ url_for('admin.dashboard') }}">取消</a><button class="btn btn-primary" type="submit">更新密碼</button></div></form></section>
{% endblock %}
