<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>緊急維護中｜Kernel CVE Radar</title>
  <style>
    :root { color-scheme: dark; --red: #ee0000; --ink: #f5f5f5; --muted: #b8b8b8; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: Inter, "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif; color: var(--ink); background: radial-gradient(circle at 15% 10%, #3a3a3a 0, #171717 38%, #050505 100%); }
    main { min-height: 100%; display: grid; place-items: center; padding: 28px; }
    .card { width: min(760px, 100%); padding: clamp(28px, 5vw, 54px); border: 1px solid rgba(255,255,255,.14); border-radius: 24px; background: rgba(12,12,12,.78); box-shadow: 0 30px 90px rgba(0,0,0,.42); }
    .topline { width: 72px; height: 6px; margin-bottom: 26px; border-radius: 999px; background: var(--red); }
    .eyebrow { color: #ff8787; font-size: 12px; font-weight: 900; letter-spacing: .18em; text-transform: uppercase; }
    h1 { margin: 14px 0 18px; font-size: clamp(36px, 7vw, 66px); line-height: 1.05; letter-spacing: -.05em; }
    p { margin: 0; color: var(--muted); font-size: clamp(16px, 2vw, 20px); line-height: 1.8; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; color: #d8d8d8; font-size: 13px; }
    .pill { padding: 7px 11px; border: 1px solid rgba(255,255,255,.12); border-radius: 999px; background: rgba(255,255,255,.06); }
  </style>
</head>
<body>
  <main>
    <section class="card" role="status" aria-live="polite">
      <div class="topline"></div>
      <div class="eyebrow">Red Hat TAM Day 2026 · Kernel CVE Radar</div>
      <h1>緊急維護中</h1>
      <p>系統目前暫停服務並進行安全維護，請稍後再試。</p>
      <div class="meta" aria-label="維護資訊">
        <span class="pill">Service: Maintenance</span>
        <span class="pill">Handled by: Apache httpd</span>
        <span class="pill">Retry-After: 300s</span>
      </div>
    </section>
  </main>
</body>
</html>
