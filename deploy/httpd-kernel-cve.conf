# /etc/httpd/conf.d/kernel-cve-radar.conf
# 需要 mod_proxy、mod_proxy_http、mod_headers

<VirtualHost *:80>
    ServerName kernel-cve.example.com

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass        / http://127.0.0.1:8000/ connectiontimeout=5 timeout=60
    ProxyPassReverse / http://127.0.0.1:8000/

    ErrorLog  /var/log/httpd/kernel-cve-error.log
    CustomLog /var/log/httpd/kernel-cve-access.log combined

    <Location />
        Require all granted
    </Location>
</VirtualHost>
