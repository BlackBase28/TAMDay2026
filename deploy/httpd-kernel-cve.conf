# /etc/httpd/conf.d/kernel-cve-radar.conf
# 需要 mod_ssl、mod_proxy、mod_proxy_http、mod_headers、mod_rewrite

<VirtualHost *:80>
    ServerName kernel-cve.example.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,NE]

    ErrorLog  /var/log/httpd/error_log
    CustomLog /var/log/httpd/access_log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName kernel-cve.example.com

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/kernel-cve-radar.crt
    SSLCertificateKeyFile /etc/pki/tls/private/kernel-cve-radar.key

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder off

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyAddHeaders On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass        / http://127.0.0.1:8000/ connectiontimeout=5 timeout=60
    ProxyPassReverse / http://127.0.0.1:8000/

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  /var/log/httpd/error_log
    CustomLog /var/log/httpd/access_log combined

    <Location />
        Require all granted
    </Location>
</VirtualHost>
