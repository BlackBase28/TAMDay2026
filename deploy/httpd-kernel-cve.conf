# /etc/httpd/conf.d/kernel-cve-radar.conf
# 需要 mod_ssl、mod_proxy、mod_proxy_http、mod_headers、mod_rewrite

<VirtualHost *:80>
    ServerName kernel-cve.example.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,NE]

    ErrorLog  /var/log/httpd/kernel-cve-http-error.log
    CustomLog /var/log/httpd/kernel-cve-http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName kernel-cve.example.com

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/kernel-cve-radar.crt
    SSLCertificateKeyFile /etc/pki/tls/private/kernel-cve-radar.key

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder off

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyAddHeaders On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass        / http://127.0.0.1:8000/ connectiontimeout=5 timeout=60
    ProxyPassReverse / http://127.0.0.1:8000/

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # %a is the resolved client IP (after mod_remoteip, when enabled).
    # %{c}a is the direct TCP peer, normally the cloud load balancer.
    LogFormat "%a %{c}a %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" \"%{X-Forwarded-For}i\" \"%{X-Forwarded-By}i\"" cve_radar_proxy
    ErrorLog  /var/log/httpd/kernel-cve-ssl-error.log
    CustomLog /var/log/httpd/kernel-cve-ssl-access.log cve_radar_proxy

    <Location />
        Require all granted
    </Location>
</VirtualHost>
